[project]
name = "nam-yahoo"
version = "0.1.0"
description = "NAM shared Yahoo Finance / yfinance client, resolver, and market pricing"
requires-python = ">=3.12"
dependencies = [
    "nam-db",
    "yfinance>=1.4.1",
    "pydantic-settings>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nam_yahoo"]

[tool.uv.sources]
nam-db = { workspace = true }
