[project]
name = "nam-db"
version = "0.1.0"
description = "NAM shared database models, enums, and Alembic migrations"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "alembic-postgresql-enum>=1.7",
    "pgvector>=0.3",
    "pydantic-settings>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nam_db"]
