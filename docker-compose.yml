services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nam
      POSTGRES_PASSWORD: nam
      POSTGRES_DB: nam
    volumes:
      - nam_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nam -d nam"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

volumes:
  nam_pgdata:
